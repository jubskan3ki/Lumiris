# ─────────────────────────────────────────────────────────────────────────────
# Dev overlay — bind-mounts the monorepo for HMR and runs apps via Bun.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:
    traefik:
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --api.insecure=true
            - --api.dashboard=true
            - --log.level=DEBUG
        ports:
            - '80:80'
            - '8080:8080'

    admin:
        image: oven/bun:1.1.38-alpine
        working_dir: /repo
        command: ['bun', 'run', 'dev:admin']
        ports: ['3001:3001']
        volumes:
            - ./:/repo
            - /repo/node_modules
            - /repo/apps/admin/.next
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: 'true'
            CHOKIDAR_USEPOLLING: 'true'
        healthcheck:
            disable: true

    web:
        image: oven/bun:1.1.38-alpine
        working_dir: /repo
        command: ['bun', 'run', 'dev:web']
        ports: ['3000:3000']
        volumes:
            - ./:/repo
            - /repo/node_modules
            - /repo/apps/web/.next
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: 'true'
            CHOKIDAR_USEPOLLING: 'true'
        healthcheck:
            disable: true

    mobile:
        image: oven/bun:1.1.38-alpine
        working_dir: /repo
        command: ['bun', 'run', 'dev:mobile']
        ports: ['3002:3002']
        volumes:
            - ./:/repo
            - /repo/node_modules
            - /repo/apps/mobile/.next
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: 'true'
            CHOKIDAR_USEPOLLING: 'true'
        healthcheck:
            disable: true

    client:
        image: oven/bun:1.1.38-alpine
        working_dir: /repo
        command: ['bun', 'run', 'dev:client']
        ports: ['3003:3003']
        volumes:
            - ./:/repo
            - /repo/node_modules
            - /repo/apps/client/.next
        environment:
            NODE_ENV: development
            WATCHPACK_POLLING: 'true'
            CHOKIDAR_USEPOLLING: 'true'
        healthcheck:
            disable: true

    api:
        image: oven/bun:1.1.38-alpine
        working_dir: /repo/apps/api
        command: ['bun', 'run', 'dev']
        ports: ['4000:4000']
        volumes:
            - ./:/repo
            - /repo/node_modules
        environment:
            NODE_ENV: development
            PORT: 4000
        healthcheck:
            disable: true

    postgres:
        ports: ['5432:5432']

    redis:
        ports: ['6379:6379']
