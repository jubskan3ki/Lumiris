---
# Rotate secrets stored in ansible/secrets.sops.yml.
# Workflow:
#   1. Update the encrypted vault locally (`sops ansible/secrets.sops.yml`).
#   2. Commit the new ciphertext.
#   3. Run this playbook — it ships the new secrets and restarts the API
#      and admin services in a no-downtime fashion (rolling restart).

- name: Rotate LUMIRIS secrets
  hosts: lumiris_vps
  become: true
  gather_facts: false

  vars_files:
      - secrets.sops.yml # decoded in-memory by the sops Ansible plugin

  pre_tasks:
      - name: Sanity — sops binary present locally
        delegate_to: localhost
        become: false
        run_once: true
        ansible.builtin.command: sops --version
        register: sops_check
        changed_when: false
        failed_when: sops_check.rc != 0

  tasks:
      - name: Render fresh .env from rotated secrets
        ansible.builtin.template:
            src: templates/env.j2
            dest: '{{ app_root }}/.env'
            owner: "{{ deploy_user | default('deploy') }}"
            group: "{{ deploy_user | default('deploy') }}"
            mode: '0600'
        no_log: true

      - name: Re-login to GHCR with new token
        ansible.builtin.shell: |
            echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
        args:
            executable: /bin/bash
        no_log: true
        changed_when: false

      - name: Rolling restart of services that consume rotated secrets
        ansible.builtin.command:
            cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --force-recreate {{ item }}
            chdir: '{{ app_root }}'
        loop: [api, admin, web, mobile]
        environment:
            IMAGE_TAG: "{{ lookup('file', app_root + '/.deployed-tag') | regex_search('IMAGE_TAG=(.+)', '\\1') | first | default('latest') }}"

      - name: Audit — record rotation timestamp
        ansible.builtin.lineinfile:
            path: '{{ app_root }}/.secret-rotations.log'
            line: '{{ ansible_date_time.iso8601 | default("") }} rotation by {{ lookup("env", "USER") }}'
            create: true
            mode: '0644'
