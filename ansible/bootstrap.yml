---
# Bootstrap a fresh VPS for LUMIRIS.
# Idempotent: safe to re-run after kernel upgrades or user rotations.

- name: Bootstrap LUMIRIS VPS (Docker + hardening)
  hosts: lumiris_vps
  become: true
  gather_facts: true

  vars:
      deploy_user: deploy
      ssh_port: 22
      docker_users: ['{{ deploy_user }}']

  tasks:
      # ── 1. System base ──────────────────────────────────────────────
      - name: Update apt cache
        ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

      - name: Upgrade system packages
        ansible.builtin.apt:
            upgrade: dist
            autoremove: true

      - name: Install base utilities
        ansible.builtin.apt:
            name:
                - ca-certificates
                - curl
                - gnupg
                - ufw
                - fail2ban
                - unattended-upgrades
                - logrotate
                - htop
                - jq
                - rsync
            state: present

      # ── 2. Deploy user (sudo, no password) ──────────────────────────
      - name: Ensure deploy group
        ansible.builtin.group:
            name: '{{ deploy_user }}'
            state: present

      - name: Ensure deploy user
        ansible.builtin.user:
            name: '{{ deploy_user }}'
            group: '{{ deploy_user }}'
            shell: /bin/bash
            create_home: true
            state: present

      - name: Sudoers — passwordless for deploy
        ansible.builtin.copy:
            dest: /etc/sudoers.d/lumiris-deploy
            mode: '0440'
            content: '{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL'
            validate: visudo -cf %s

      # ── 3. SSH hardening ────────────────────────────────────────────
      - name: SSH — disable root login & password auth
        ansible.builtin.copy:
            dest: /etc/ssh/sshd_config.d/10-lumiris.conf
            mode: '0644'
            content: |
                Port {{ ssh_port }}
                PermitRootLogin no
                PasswordAuthentication no
                ChallengeResponseAuthentication no
                KbdInteractiveAuthentication no
                UsePAM yes
                X11Forwarding no
                ClientAliveInterval 300
                ClientAliveCountMax 2
        notify: Restart sshd

      # ── 4. Firewall (UFW) ───────────────────────────────────────────
      - name: UFW — default deny incoming
        community.general.ufw:
            direction: incoming
            policy: deny

      - name: UFW — default allow outgoing
        community.general.ufw:
            direction: outgoing
            policy: allow

      - name: UFW — allow SSH/HTTP/HTTPS
        community.general.ufw:
            rule: allow
            port: '{{ item }}'
            proto: tcp
        loop: ['{{ ssh_port }}', '80', '443']

      - name: UFW — enable
        community.general.ufw:
            state: enabled
            logging: 'on'

      # ── 5. fail2ban ─────────────────────────────────────────────────
      - name: fail2ban — local jail for sshd
        ansible.builtin.copy:
            dest: /etc/fail2ban/jail.d/lumiris.conf
            mode: '0644'
            content: |
                [DEFAULT]
                bantime  = 1h
                findtime = 10m
                maxretry = 5

                [sshd]
                enabled = true
                port    = {{ ssh_port }}
        notify: Restart fail2ban

      # ── 6. Docker engine + compose plugin ───────────────────────────
      - name: Docker — apt key
        ansible.builtin.apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            keyring: /etc/apt/keyrings/docker.gpg
            state: present

      - name: Docker — apt repo
        ansible.builtin.apt_repository:
            repo: >-
                deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
                https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            filename: docker
            state: present

      - name: Docker — install engine + compose plugin
        ansible.builtin.apt:
            name:
                - docker-ce
                - docker-ce-cli
                - containerd.io
                - docker-buildx-plugin
                - docker-compose-plugin
            update_cache: true
            state: present

      - name: Docker — daemon hardening (live-restore + log caps)
        ansible.builtin.copy:
            dest: /etc/docker/daemon.json
            mode: '0644'
            content: |
                {
                  "live-restore": true,
                  "log-driver": "json-file",
                  "log-opts": { "max-size": "10m", "max-file": "5" },
                  "userland-proxy": false,
                  "no-new-privileges": true
                }
        notify: Restart docker

      - name: Docker — add deploy user to docker group
        ansible.builtin.user:
            name: '{{ item }}'
            groups: docker
            append: true
        loop: '{{ docker_users }}'

      # ── 7. App layout ───────────────────────────────────────────────
      - name: Create app root
        ansible.builtin.file:
            path: '{{ app_root }}'
            state: directory
            owner: '{{ deploy_user }}'
            group: '{{ deploy_user }}'
            mode: '0755'

  handlers:
      - name: Restart sshd
        ansible.builtin.service:
            name: ssh
            state: restarted

      - name: Restart fail2ban
        ansible.builtin.service:
            name: fail2ban
            state: restarted

      - name: Restart docker
        ansible.builtin.service:
            name: docker
            state: restarted
