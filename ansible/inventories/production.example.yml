# Copy to production.yml and replace the placeholders. Never commit the real file.
all:
    children:
        lumiris_vps:
            hosts:
                vps-fr-1:
                    ansible_host: vps.lumiris.io
                    ansible_user: deploy
                    ansible_port: 22
                    ansible_ssh_private_key_file: ~/.ssh/lumiris_deploy_ed25519
            vars:
                # Domains served by Traefik
                web_host: lumiris.io
                admin_host: admin.lumiris.io
                mobile_host: m.lumiris.io
                api_host: api.lumiris.io
                acme_email: ops@lumiris.io

                # GHCR
                ghcr_owner: lumiris
                ghcr_username: lumiris-bot
                # Provide ghcr_token via --extra-vars or sops-encrypted vars
                # ghcr_token: see secrets.sops.yml

                # App layout on the host
                app_root: /opt/lumiris
                compose_files:
                    - docker-compose.yml
                    - docker-compose.prod.yml

                # Health-check window for zero-downtime deploys
                deploy_health_timeout_seconds: 240
