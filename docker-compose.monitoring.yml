services:
    tempo:
        image: grafana/tempo:2.6.0
        profiles: [monitoring]
        command: ['-config.file=/etc/tempo.yml']
        volumes:
            - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
            - tempo-data:/var/tempo
        ports:
            - '3200:3200' # tempo UI / metrics
            - '4317:4317' # OTLP gRPC
            - '4318:4318' # OTLP HTTP — apps push traces here
        extra_hosts:
            - 'host.docker.internal:host-gateway'

    prometheus:
        image: prom/prometheus:v2.55.1
        profiles: [monitoring]
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.enable-remote-write-receiver'
            - '--web.enable-lifecycle'
        volumes:
            - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
            - prometheus-data:/prometheus
        ports:
            - '9090:9090'
        extra_hosts:
            - 'host.docker.internal:host-gateway'

    loki:
        image: grafana/loki:3.2.1
        profiles: [monitoring]
        command: ['-config.file=/etc/loki/local-config.yaml']
        volumes:
            - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
            - loki-data:/loki
        ports:
            - '3100:3100'
        extra_hosts:
            - 'host.docker.internal:host-gateway'

    grafana:
        image: grafana/grafana:11.3.1
        profiles: [monitoring]
        depends_on: [prometheus, tempo, loki]
        environment:
            GF_AUTH_ANONYMOUS_ENABLED: 'true'
            GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
            GF_AUTH_DISABLE_LOGIN_FORM: 'true'
            GF_FEATURE_TOGGLES_ENABLE: 'traceqlEditor'
            GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
        volumes:
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        ports:
            - '3030:3000' # host:container — admin already owns 3001
        extra_hosts:
            - 'host.docker.internal:host-gateway'

volumes:
    tempo-data:
    prometheus-data:
    loki-data:
    grafana-data:
