name: Release

# Triggered by `git tag v* && git push --tags`.
# Builds one image per app, pushes to GHCR, generates an SBOM via syft,
# and signs the digest keyless with cosign + GitHub OIDC.

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Tag to build (e.g. v0.1.0)'
                required: true

permissions:
    contents: read
    packages: write
    id-token: write # cosign keyless OIDC
    attestations: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
    build:
        name: Build & push · ${{ matrix.app }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - app: admin
                      context: .
                      dockerfile: apps/admin/Dockerfile
                    - app: web
                      context: .
                      dockerfile: apps/web/Dockerfile
                    - app: mobile
                      context: .
                      dockerfile: apps/mobile/Dockerfile
                    - app: api
                      context: .
                      dockerfile: apps/api/Dockerfile

        outputs:
            sha_short: ${{ steps.meta.outputs.sha_short }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Compute identifiers
              id: meta
              run: |
                  SHA_SHORT=$(git rev-parse --short HEAD)
                  TAG_NAME="${GITHUB_REF_NAME}"
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    TAG_NAME="${{ inputs.tag }}"
                  fi
                  echo "sha_short=${SHA_SHORT}"  >> "$GITHUB_OUTPUT"
                  echo "tag_name=${TAG_NAME}"    >> "$GITHUB_OUTPUT"
                  echo "image=${REGISTRY}/${IMAGE_NAMESPACE,,}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build & push image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: true
                  # Tags: the immutable git short-SHA + the human-readable git tag.
                  # `latest` is intentionally absent — never used in prod.
                  tags: |
                      ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_short }}
                      ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag_name }}
                  provenance: mode=max
                  sbom: false # generated separately via syft for richer output
                  cache-from: type=gha,scope=${{ matrix.app }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.app }}
                  labels: |
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.version=${{ steps.meta.outputs.tag_name }}
                      org.opencontainers.image.title=lumiris-${{ matrix.app }}

            - name: Install syft
              uses: anchore/sbom-action/download-syft@v0

            - name: Generate SBOM (SPDX-JSON)
              run: |
                  mkdir -p sbom
                  syft "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}" \
                    -o spdx-json=sbom/${{ matrix.app }}-${{ steps.meta.outputs.sha_short }}.spdx.json

            - name: Upload SBOM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sbom-${{ matrix.app }}-${{ steps.meta.outputs.sha_short }}
                  path: sbom/${{ matrix.app }}-${{ steps.meta.outputs.sha_short }}.spdx.json
                  retention-days: 90

            - name: Install cosign
              uses: sigstore/cosign-installer@v3

            - name: Cosign keyless sign (digest)
              env:
                  COSIGN_EXPERIMENTAL: '1'
              run: |
                  cosign sign --yes \
                    "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

            - name: Cosign attest SBOM
              env:
                  COSIGN_EXPERIMENTAL: '1'
              run: |
                  cosign attest --yes \
                    --predicate sbom/${{ matrix.app }}-${{ steps.meta.outputs.sha_short }}.spdx.json \
                    --type spdxjson \
                    "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

            - name: Build provenance attestation
              uses: actions/attest-build-provenance@v2
              with:
                  subject-name: ${{ steps.meta.outputs.image }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true

    release-summary:
        name: Release summary
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Print deploy hint
              run: |
                  echo "::notice title=Release ready::Tag pushed. On the VPS run:"
                  echo "  make deploy-zd IMAGE_TAG=${{ needs.build.outputs.sha_short }}"
