name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-typecheck-test:
        name: Lint · Typecheck · Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.1.38'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Lint (JS/TS)
              run: bun run lint
            - name: Lint (CSS)
              run: bun run lint:css
            - name: Format check
              run: bun run format:check
            - name: Typecheck
              run: bun run typecheck
            - name: Test
              run: bun run test
            - name: Knip — dead code & deps
              run: bun run knip

    build:
        name: Build all apps
        runs-on: ubuntu-latest
        needs: lint-typecheck-test
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.1.38'
            - name: Install dependencies
              run: bun install --frozen-lockfile
            - name: Build
              run: bun run build

    lighthouse:
        name: Lighthouse CI
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.1.38'
            - run: bun install --frozen-lockfile
            - run: bun --filter @lumiris/site build
            - run: bun run lhci
              env:
                  LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    mobile-tauri-build:
        name: Mobile · Tauri build (${{ matrix.os }})
        needs: lint-typecheck-test
        continue-on-error: true
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: '1.1.38'
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
            - name: Install Linux build deps
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libssl-dev \
                    libgtk-3-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    patchelf
            - name: Cache cargo registry & target
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      apps/mobile/src-tauri/target
                  key: ${{ matrix.os }}-cargo-${{ hashFiles('apps/mobile/src-tauri/Cargo.toml') }}
                  restore-keys: |
                      ${{ matrix.os }}-cargo-
            - name: Install JS deps
              run: bun install --frozen-lockfile
            - name: Tauri build (unsigned)
              working-directory: apps/mobile
              run: bunx @tauri-apps/cli@latest build
