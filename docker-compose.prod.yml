# ─────────────────────────────────────────────────────────────────────────────
# Prod overlay — replicas, resource caps, no host-port exposure for datastores.
# Replicas + rolling update enable the `make deploy-zd` zero-downtime pattern:
#   scale +1 → wait healthy → scale -1.
# ─────────────────────────────────────────────────────────────────────────────

services:
    admin:
        deploy:
            replicas: 2
            update_config:
                parallelism: 1
                order: start-first
                failure_action: rollback
                delay: 10s
            restart_policy:
                condition: on-failure
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    web:
        deploy:
            replicas: 3
            update_config:
                parallelism: 1
                order: start-first
                failure_action: rollback
                delay: 10s
            restart_policy:
                condition: on-failure
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    mobile:
        deploy:
            replicas: 2
            update_config:
                parallelism: 1
                order: start-first
                failure_action: rollback
                delay: 10s
            restart_policy:
                condition: on-failure
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    api:
        deploy:
            replicas: 3
            update_config:
                parallelism: 1
                order: start-first
                failure_action: rollback
                delay: 10s
            restart_policy:
                condition: on-failure
                max_attempts: 3
            resources:
                limits:
                    cpus: '1.5'
                    memory: 768M
                reservations:
                    cpus: '0.5'
                    memory: 256M

    postgres:
        ports: []
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 2G

    redis:
        ports: []
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
