# ─────────────────────────────────────────────────────────────────────────────
# LUMIRIS Ecosystem · base stack
# Defaults are production-leaning. Layer overlays for environment specifics:
#   make stack-up               (compose.yml + compose.dev.yml)
#   make stack-up ENV=prod      (compose.yml + compose.prod.yml)
# ─────────────────────────────────────────────────────────────────────────────

x-app-defaults: &app-defaults
    restart: unless-stopped
    networks: [lumiris-edge, lumiris-internal]
    env_file: .env
    logging:
        driver: json-file
        options:
            max-size: '10m'
            max-file: '3'

services:
    # ─── Reverse proxy + ACME LetsEncrypt ──────────────────────────────────
    traefik:
        image: traefik:v3.2
        container_name: lumiris-traefik
        restart: unless-stopped
        command:
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entrypoints.web.http.redirections.entrypoint.scheme=https
            - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-ops@lumiris.io}
            - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
            - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
            - --accesslog=true
            - --metrics.prometheus=true
        ports:
            - '80:80'
            - '443:443'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik-acme:/letsencrypt
        networks: [lumiris-edge]
        labels:
            - traefik.enable=true

    # ─── Apps ──────────────────────────────────────────────────────────────
    admin:
        <<: *app-defaults
        image: ghcr.io/${GHCR_OWNER:-lumiris}/admin:${IMAGE_TAG:-latest}
        container_name: lumiris-admin
        depends_on: [api]
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        labels:
            - traefik.enable=true
            - traefik.http.routers.admin.rule=Host(`${ADMIN_HOST:-admin.lumiris.local}`)
            - traefik.http.routers.admin.entrypoints=websecure
            - traefik.http.routers.admin.tls.certresolver=letsencrypt
            - traefik.http.services.admin.loadbalancer.server.port=3001

    web:
        <<: *app-defaults
        image: ghcr.io/${GHCR_OWNER:-lumiris}/web:${IMAGE_TAG:-latest}
        container_name: lumiris-web
        depends_on: [api]
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        labels:
            - traefik.enable=true
            - traefik.http.routers.web.rule=Host(`${WEB_HOST:-lumiris.local}`)
            - traefik.http.routers.web.entrypoints=websecure
            - traefik.http.routers.web.tls.certresolver=letsencrypt
            - traefik.http.services.web.loadbalancer.server.port=3000

    mobile:
        <<: *app-defaults
        image: ghcr.io/${GHCR_OWNER:-lumiris}/mobile:${IMAGE_TAG:-latest}
        container_name: lumiris-mobile
        depends_on: [api]
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        labels:
            - traefik.enable=true
            - traefik.http.routers.mobile.rule=Host(`${MOBILE_HOST:-m.lumiris.local}`)
            - traefik.http.routers.mobile.entrypoints=websecure
            - traefik.http.routers.mobile.tls.certresolver=letsencrypt
            - traefik.http.services.mobile.loadbalancer.server.port=3002

    client:
        <<: *app-defaults
        image: ghcr.io/${GHCR_OWNER:-lumiris}/client:${IMAGE_TAG:-latest}
        container_name: lumiris-client
        depends_on: [api]
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        labels:
            - traefik.enable=true
            - traefik.http.routers.client.rule=Host(`${CLIENT_HOST:-client.lumiris.local}`)
            - traefik.http.routers.client.entrypoints=websecure
            - traefik.http.routers.client.tls.certresolver=letsencrypt
            - traefik.http.services.client.loadbalancer.server.port=3003

    api:
        <<: *app-defaults
        image: ghcr.io/${GHCR_OWNER:-lumiris}/api:${IMAGE_TAG:-latest}
        container_name: lumiris-api
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            PORT: 4000
            DATABASE_URL: ${DATABASE_URL}
            REDIS_URL: ${REDIS_URL}
            JWT_SECRET: ${JWT_SECRET}
            CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://lumiris.local,https://admin.lumiris.local}
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`${API_HOST:-api.lumiris.local}`)
            - traefik.http.routers.api.entrypoints=websecure
            - traefik.http.routers.api.tls.certresolver=letsencrypt
            - traefik.http.services.api.loadbalancer.server.port=4000

    # ─── Datastores ────────────────────────────────────────────────────────
    postgres:
        image: postgres:17-alpine
        container_name: lumiris-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-lumiris}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumiris}
            POSTGRES_DB: ${POSTGRES_DB:-lumiris}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        networks: [lumiris-internal]
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lumiris}']
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        container_name: lumiris-redis
        restart: unless-stopped
        command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
        volumes:
            - redis-data:/data
        networks: [lumiris-internal]
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5

networks:
    lumiris-edge:
        driver: bridge
    lumiris-internal:
        driver: bridge
        internal: false

volumes:
    traefik-acme:
    postgres-data:
    redis-data:
