global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
        monitor: lumiris

rule_files:
    - /etc/prometheus/rules/*.yml

# Tempo's native histograms get pushed via OTLP and exposed by Tempo itself
# at /metrics; Prometheus scrapes Tempo to surface trace-derived RED metrics.
scrape_configs:
    - job_name: lumiris-api
      metrics_path: /metrics
      static_configs:
          - targets: ['host.docker.internal:4000']
            labels: { app: lumiris-api }

    - job_name: prometheus
      static_configs:
          - targets: ['localhost:9090']

    - job_name: tempo
      static_configs:
          - targets: ['tempo:3200']

    - job_name: loki
      static_configs:
          - targets: ['loki:3100']
